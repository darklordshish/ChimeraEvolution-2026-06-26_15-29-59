<svg viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg">
<title>Слои восприятия сливаются в один кадр против отдельной врезки PiP</title>
<desc>Слева зрение, нюх-туман и тепло сливаются в один кадр; справа врезка-окно перечёркнута</desc>
<defs>
<marker id="fa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6" fill="none" stroke="#1D9E75" stroke-width="1.3"/></marker>
</defs>
<style>
text{font-family:'Segoe UI',Arial,sans-serif}
.t{fill:#2C2C2A;font-size:15px;font-weight:600}
.ts{fill:#5F5E5A;font-size:13px}
.tg{fill:#0F6E56;font-size:13px}
</style>
<rect width="680" height="250" fill="#ffffff"/>

<line x1="340" y1="20" x2="340" y2="230" stroke="#B4B2A9" stroke-width="1"/>

<text class="t" x="24" y="38">Слияние — так</text>
<rect x="32" y="64" width="128" height="30" rx="4" fill="none" stroke="#888780" stroke-width="1.2"/>
<text class="ts" x="46" y="84">Зрение</text>
<rect x="32" y="108" width="128" height="30" rx="4" fill="none" stroke="#888780" stroke-width="1.2"/>
<text class="ts" x="46" y="128">+ Нюх-туман</text>
<rect x="32" y="152" width="128" height="30" rx="4" fill="none" stroke="#888780" stroke-width="1.2"/>
<text class="ts" x="46" y="172">+ Тепло</text>
<line x1="160" y1="79" x2="216" y2="118" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#fa)"/>
<line x1="160" y1="123" x2="216" y2="124" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#fa)"/>
<line x1="160" y1="167" x2="216" y2="130" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#fa)"/>
<rect x="224" y="86" width="98" height="78" rx="6" fill="none" stroke="#1D9E75" stroke-width="2"/>
<text class="tg" x="242" y="120">один</text>
<text class="tg" x="242" y="139">слитый кадр</text>

<text class="t" x="372" y="38">Врезка PiP — не так</text>
<rect x="388" y="64" width="200" height="138" rx="6" fill="none" stroke="#888780" stroke-width="1.4"/>
<rect x="524" y="76" width="50" height="40" rx="4" fill="none" stroke="#888780" stroke-width="1.2"/>
<text class="ts" x="536" y="101">эхо</text>
<line x1="388" y1="64" x2="588" y2="202" stroke="#E24B4A" stroke-width="2"/>
<line x1="588" y1="64" x2="388" y2="202" stroke="#E24B4A" stroke-width="2"/>
<text class="ts" x="388" y="224">интерфейсно, бьёт погружение</text>
</svg>
